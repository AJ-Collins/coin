version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aiscalping_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aiscalping_redis
    restart: always
    ports:
      - "6374:6379"

volumes:
  postgres_data:
